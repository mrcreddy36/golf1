<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Golfer of the Year — Live Scoring</title>
<style>
  :root{
    --green-900:#0b3d2e;--green-800:#12513c;--green-700:#177a52;--green-600:#1f9d63;
    --green-100:#e3f4ec;--gold:#c9a227;--gold-light:#f3e6b3;
    --ink:#132a20;--muted:#5c6d64;--line:#dbe6df;--bg:#f4f8f5;--card:#fff;
    --birdie:#d8ecff;--eagle:#ffd9ec;--bogey:#fdeede;--dbogey:#f7dcdc;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 6px 20px rgba(11,61,46,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);font-size:16px;line-height:1.45}
  .top{background:linear-gradient(135deg,var(--green-900),var(--green-700));color:#fff;padding:14px 18px;
    display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20;box-shadow:var(--shadow)}
  .top .logo{font-size:22px}.top h1{font-size:16px;margin:0;font-weight:700}
  .top .sub{font-size:12px;opacity:.85}.top .spacer{flex:1}
  .top button{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25);
    padding:6px 11px;border-radius:8px;font-size:13px;cursor:pointer}
  main{max-width:780px;margin:0 auto;padding:16px 14px 96px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
  h2{font-size:18px;margin:0 0 4px}.desc{color:var(--muted);font-size:13.5px;margin:0 0 14px}
  label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
  input,select{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:16px;background:#fff;color:var(--ink)}
  input:focus,select:focus{outline:none;border-color:var(--green-600);box-shadow:0 0 0 3px var(--green-100)}
  .btn{background:var(--green-700);color:#fff;border:none;padding:13px 18px;border-radius:11px;font-size:16px;font-weight:700;cursor:pointer;width:100%}
  .btn:active{transform:translateY(1px)}.btn.gold{background:var(--gold);color:#3a2f06}
  .btn.ghost{background:#fff;color:var(--green-800);border:1px solid var(--line)}
  .btn.sm{padding:8px 12px;font-size:13px;width:auto}
  .row{display:flex;gap:10px}.row>*{flex:1}
  .tabs{display:flex;gap:6px;margin-bottom:14px}
  .tabs button{flex:1;padding:11px;border-radius:10px;border:1px solid var(--line);background:#fff;font-weight:700;color:var(--muted);cursor:pointer;font-size:14px}
  .tabs button.active{background:var(--green-800);color:#fff;border-color:var(--green-800)}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:700}
  .pill.grn{background:var(--green-100);color:var(--green-800)}.pill.gold{background:var(--gold-light);color:#6b5410}
  .muted{color:var(--muted)}.center{text-align:center}
  table{width:100%;border-collapse:collapse;font-size:14.5px}
  th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  td.n,th.n{text-align:right;font-variant-numeric:tabular-nums}
  .rank{font-weight:800;color:var(--green-800)}
  .flash{animation:fl 1.6s ease}@keyframes fl{0%{background:var(--gold-light)}100%{background:transparent}}
  /* hole stepper */
  .hole-big{display:flex;align-items:center;justify-content:space-between;margin:8px 0 14px}
  .hole-big .h{font-size:15px;color:var(--muted);font-weight:700}
  .stepper{display:flex;align-items:center;gap:16px;justify-content:center;margin:10px 0}
  .stepper button{width:64px;height:64px;border-radius:50%;border:1px solid var(--line);background:#fff;font-size:30px;font-weight:800;color:var(--green-800);cursor:pointer}
  .stepper .val{font-size:52px;font-weight:800;min-width:90px;text-align:center}
  .nav-holes{display:flex;gap:8px;margin-top:8px}
  .nav-holes button{flex:1;padding:12px;border-radius:11px;border:1px solid var(--line);background:#fff;font-weight:700;cursor:pointer}
  .holegrid{display:grid;grid-template-columns:repeat(9,1fr);gap:5px;margin-top:12px}
  .holegrid .hcell{border:1px solid var(--line);border-radius:8px;padding:5px 2px;text-align:center;font-size:12px;cursor:pointer}
  .hcell.cur{border-color:var(--green-600);box-shadow:0 0 0 2px var(--green-100)}
  .hcell .s{font-size:16px;font-weight:800}
  .sc-eagle{background:var(--eagle)}.sc-birdie{background:var(--birdie)}.sc-bogey{background:var(--bogey)}.sc-dbogey{background:var(--dbogey)}
  .saved{font-size:12px;color:var(--green-600);font-weight:700}
  .who{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:8px}
  .who button{white-space:nowrap;padding:9px 13px;border-radius:20px;border:1px solid var(--line);background:#fff;font-weight:700;font-size:13.5px;cursor:pointer;color:var(--muted)}
  .who button.active{background:var(--green-700);color:#fff;border-color:var(--green-700)}
  .banner{background:#fff4d6;border:1px solid #f0dca0;color:#7a5c00;border-radius:12px;padding:14px;font-size:14px;margin-bottom:16px}
  .live-dot{width:9px;height:9px;border-radius:50%;background:#e74c3c;display:inline-block;margin-right:5px;animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .grp{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
  .team-line{display:flex;justify-content:space-between;padding:7px 9px;border-radius:8px;margin-top:6px;background:var(--green-100)}
  .team-win{background:var(--gold-light);font-weight:700}
  .copy{display:flex;gap:8px;align-items:center;background:var(--green-100);border-radius:10px;padding:10px 12px;font-size:13px;word-break:break-all}
  a.link{color:var(--green-700);font-weight:700;text-decoration:none}
</style>
</head>
<body>
<div class="top">
  <div class="logo">🏌️</div>
  <div><h1 id="topTitle">Golfer of the Year</h1><div class="sub" id="topSub">Live scoring</div></div>
  <div class="spacer"></div>
  <button id="homeBtn" onclick="goHome()" style="display:none">Home</button>
</div>
<main id="app"><div class="card center muted">Loading…</div></main>

<!-- Supabase JS (v2, UMD) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   CONFIG — paste your Supabase project values here (see SETUP.md)
   ============================================================ */
const SUPABASE_URL      = "https://srmykgxyslnpaafcicsa.supabase.co";       // e.g. https://abcd1234.supabase.co
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNybXlrZ3h5c2xucGFhZmNpY3NhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MTE3MDQsImV4cCI6MjA5ODQ4NzcwNH0.WWwelMPG7clLZIjcZIdPmi9wo8y1OdzTopnX7AA3WDE";  // the public anon key

const configured = SUPABASE_URL.startsWith("http") && SUPABASE_ANON_KEY.length>20;
const sb = configured ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

/* ============================================================
   Scoring helpers (match the offline app + verified logic)
   ============================================================ */
function strokesOnHole(handicap,si){const h=Math.max(0,Math.round(handicap||0));
  return Math.floor(h/18)+((si<=(h%18))?1:0);}
// WHS course handicap from a player's Handicap Index + the event's tee.
//   Course Handicap = Index × (Slope / 113) + (Course Rating − Par)
// Falls back to using the index as-is if the event has no rating/slope.
function courseHandicap(index){
  const t=S.tournament;if(!t)return Math.round(index||0);
  const par=t.holes.reduce((a,h)=>a+h.par,0);
  if(t.slope&&t.course_rating!=null&&t.course_rating!==''){
    return Math.round((+index||0)*(t.slope/113)+(t.course_rating-par));
  }
  return Math.round(index||0);
}
// strokes a player receives on a hole, via their course handicap
function pStrokes(p,si){return strokesOnHole(courseHandicap(p.handicap),si);}
function esc(s){return(s+"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function toParStr(d){return d===0?"E":(d>0?"+"+d:""+d);}

/* ============================================================
   App state
   ============================================================ */
const S={tournament:null,players:[],scores:{},me:null,tab:'leaderboard',channel:null,curHole:1,entryPid:null,courses:[]};
// Finish-position points for the season-long Golfer of the Year race
const SEASON_POINTS=(()=>{const t={1:150,2:110,3:90,4:80,5:72,6:66,7:60,8:55,9:51,10:48};
  let p=46;for(let i=11;i<=30;i++){t[i]=p;p-=2;}for(let i=31;i<=50;i++){t[i]=Math.max(2,p);p-=1;}return t;})();
const seasonPts=pos=>SEASON_POINTS[pos]!=null?SEASON_POINTS[pos]:1;
const app=()=>document.getElementById('app');
const params=new URLSearchParams(location.search);

/* score map key */
const sk=(pid,hole)=>pid+"_"+hole;

/* ---- boot ---- */
async function boot(){
  if(!configured){renderSetupNeeded();return;}
  const code=params.get('e');
  if(params.get('season')!==null){return renderSeason();}
  if(params.get('admin')!==null){return renderAdminGate();}
  if(!code){return renderHome();}
  await loadEvent(code);
}
function goHome(){location.search="";}

/* ============================================================
   Data loading + realtime
   ============================================================ */
async function loadEvent(code){
  app().innerHTML=`<div class="card center muted">Loading event…</div>`;
  const {data:t,error}=await sb.from('tournaments').select('*').eq('code',code.toUpperCase()).maybeSingle();
  if(error){return renderError(error.message);}
  if(!t){return renderError('No event found for code "'+esc(code)+'".');}
  S.tournament=t;
  document.getElementById('topTitle').textContent=t.name;
  document.getElementById('topSub').textContent=(t.course||'')+(t.status==='completed'?' · Final':' · Live');
  document.getElementById('homeBtn').style.display='';
  await refreshData();
  subscribe();
  // restore "me" for this event
  const saved=localStorage.getItem('goty_me_'+t.id);
  S.me=saved&&S.players.find(p=>p.id===saved)?saved:null;
  S.entryPid=S.me;
  render();
}
async function refreshData(){
  const tid=S.tournament.id;
  const [{data:players},{data:scores}]=await Promise.all([
    sb.from('players').select('*').eq('tournament_id',tid).order('group_no',{nullsFirst:false}).order('name'),
    sb.from('scores').select('*').eq('tournament_id',tid)
  ]);
  S.players=players||[];
  S.scores={};(scores||[]).forEach(r=>{S.scores[sk(r.player_id,r.hole)]=r.strokes;});
}
function subscribe(){
  if(S.channel)sb.removeChannel(S.channel);
  const tid=S.tournament.id;
  S.channel=sb.channel('ev_'+tid)
    .on('postgres_changes',{event:'*',schema:'public',table:'scores',filter:'tournament_id=eq.'+tid},
      payload=>{const r=payload.new||payload.old;if(!r)return;
        if(payload.eventType==='DELETE')delete S.scores[sk(r.player_id,r.hole)];
        else S.scores[sk(r.player_id,r.hole)]=r.strokes;
        if(S.tab==='leaderboard')renderLeaderboardBody(true);
        if(S.tab==='enter')renderHoleGrid();})
    .on('postgres_changes',{event:'*',schema:'public',table:'players',filter:'tournament_id=eq.'+tid},
      async()=>{await refreshData();render();})
    .subscribe();
}

/* ============================================================
   Leaderboard computation
   ============================================================ */
function holesArr(){return S.tournament.holes;}
function playerLine(p){
  const holes=holesArr();const fmt=S.tournament.format;
  let gross=0,net=0,parPlayed=0,thru=0,last=0;
  for(let i=0;i<18;i++){const v=S.scores[sk(p.id,i+1)];
    if(v!=null){thru++;gross+=v;parPlayed+=holes[i].par;
      net+=v-pStrokes(p,holes[i].si);}}
  const useNet=fmt==='net';
  const scoreVal=useNet?net:gross;
  const relToPar=thru?scoreVal-parPlayed:0; // net/gross vs par of played holes
  return {p,gross,net,thru,parPlayed,scoreVal,relToPar};
}
function leaderboard(){
  const arr=S.players.map(playerLine).filter(x=>true);
  arr.sort((a,b)=>{
    if(a.thru===0&&b.thru===0)return a.p.name.localeCompare(b.p.name);
    if(a.thru===0)return 1;if(b.thru===0)return -1;
    return a.relToPar-b.relToPar || b.thru-a.thru || a.p.name.localeCompare(b.p.name);
  });
  // standard competition ranking on relToPar (only ranked if started)
  let rank=0,prev=null,seen=0;
  arr.forEach(x=>{if(x.thru===0){x.rank=null;return;}seen++;
    if(prev===null||x.relToPar!==prev){rank=seen;prev=x.relToPar;}x.rank=rank;});
  return arr;
}

/* ============================================================
   Rendering — screens
   ============================================================ */
function render(){
  const t=S.tournament;
  let tabs=`<div class="tabs">
    <button class="${S.tab==='leaderboard'?'active':''}" onclick="setTab('leaderboard')">🏆 Leaderboard</button>
    <button class="${S.tab==='enter'?'active':''}" onclick="setTab('enter')">✏️ Enter Scores</button>
    <button class="${S.tab==='teams'?'active':''}" onclick="setTab('teams')">👥 Fourballs</button></div>`;
  let body='';
  if(S.tab==='leaderboard')body=viewLeaderboard();
  else if(S.tab==='enter')body=viewEnter();
  else body=viewTeams();
  app().innerHTML=tabs+body;
  if(S.tab==='leaderboard')renderLeaderboardBody(false);
  if(S.tab==='enter')renderHoleGrid();
}
function setTab(t){S.tab=t;render();}

/* ---- Leaderboard ---- */
function viewLeaderboard(){
  const t=S.tournament;
  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <h2><span class="live-dot"></span>Live Leaderboard</h2>
      <span class="pill grn">${t.format==='net'?'NET':'GROSS'}</span></div>
    <p class="desc">${esc(t.course||'')} · par ${holesArr().reduce((a,h)=>a+h.par,0)} · updates automatically as scores are posted.</p>
    <table><thead><tr><th>Pos</th><th>Player</th><th class="n">Thru</th><th class="n">${t.format==='net'?'Net':'Gross'}</th><th class="n">To Par</th></tr></thead>
    <tbody id="lbBody"></tbody></table>
    <p class="desc" style="margin-top:10px">Ranked by score to par through holes played. "To Par" is ${t.format==='net'?'net':'gross'} vs par of completed holes.</p>
    <p class="center" style="margin-top:6px"><a class="link" href="?season">🏆 Season Golfer of the Year standings →</a></p></div>`;
}
function renderLeaderboardBody(flash){
  const body=document.getElementById('lbBody');if(!body)return;
  const arr=leaderboard();
  body.innerHTML=arr.map(x=>{
    const rel=x.thru?toParStr(x.relToPar):'—';
    const started=x.thru>0;
    return `<tr class="${flash?'flash':''}">
      <td class="rank">${started?x.rank:'–'}</td>
      <td><strong>${esc(x.p.name)}</strong> <span class="muted" style="font-size:11px">idx ${x.p.handicap} · CH ${courseHandicap(x.p.handicap)}${x.p.group_no?' · Grp '+x.p.group_no:''}</span></td>
      <td class="n">${started?(x.thru===18?'F':x.thru):'—'}</td>
      <td class="n">${started?(S.tournament.format==='net'?x.net:x.gross):'—'}</td>
      <td class="n" style="font-weight:800">${rel}</td></tr>`;
  }).join('')||`<tr><td colspan="5" class="center muted">No players yet.</td></tr>`;
}

/* ---- Enter scores ---- */
function viewEnter(){
  const t=S.tournament;
  if(!S.players.length)return `<div class="card center muted">No players in this event yet. Ask the organizer to add the field.</div>`;
  if(!S.me){return pickMe();}
  // who can I enter for?
  const meP=S.players.find(p=>p.id===S.me);
  let field=[meP];
  if(t.scoring_mode!=='self'){
    const mates=S.players.filter(p=>p.group_no!=null&&meP.group_no!=null&&p.group_no===meP.group_no);
    field=mates.length?mates:[meP];
  }
  if(!field.find(p=>p.id===S.entryPid))S.entryPid=S.me;
  const whoTabs=field.length>1?`<div class="who">${field.map(p=>
    `<button class="${S.entryPid===p.id?'active':''}" onclick="setEntry('${p.id}')">${esc(p.name.split(' ')[0])}${p.id===S.me?' (you)':''}</button>`).join('')}</div>`:'';
  const modeNote=t.scoring_mode==='self'?'You are entering your own card.':
    t.scoring_mode==='group'?'Group scoring: enter cards for your fourball.':'Enter your card, or tap a groupmate to score for them.';
  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2>Enter Scores</h2><button class="btn ghost sm" onclick="changeMe()">Not you?</button></div>
    <p class="desc">${modeNote}</p>
    ${whoTabs}
    <div id="entryArea"></div></div>`;
}
function pickMe(){
  const opts=S.players.slice().sort((a,b)=>a.name.localeCompare(b.name))
    .map(p=>`<option value="${p.id}">${esc(p.name)} (${p.handicap})${p.group_no?' · Grp '+p.group_no:''}</option>`).join('');
  return `<div class="card"><h2>Who are you?</h2>
    <p class="desc">Pick your name to start scoring. We'll remember you on this phone for this event.</p>
    <label>Your name</label><select id="mePick"><option value="">Select…</option>${opts}</select>
    <div style="height:12px"></div><button class="btn" onclick="confirmMe()">Start scoring</button></div>`;
}
function confirmMe(){const v=document.getElementById('mePick').value;if(!v){alert('Please select your name.');return;}
  S.me=v;S.entryPid=v;localStorage.setItem('goty_me_'+S.tournament.id,v);render();}
function changeMe(){localStorage.removeItem('goty_me_'+S.tournament.id);S.me=null;render();}
function setEntry(pid){S.entryPid=pid;render();}

function renderHoleGrid(){
  const area=document.getElementById('entryArea');if(!area)return;
  const p=S.players.find(x=>x.id===S.entryPid);if(!p)return;
  const holes=holesArr();const h=S.curHole;const hole=holes[h-1];
  const cur=S.scores[sk(p.id,h)];
  let gross=0,thru=0;for(let i=0;i<18;i++){const v=S.scores[sk(p.id,i+1)];if(v!=null){gross+=v;thru++;}}
  const parThru=(()=>{let s=0;for(let i=0;i<18;i++)if(S.scores[sk(p.id,i+1)]!=null)s+=holes[i].par;return s;})();
  const stk=pStrokes(p,hole.si);
  const grid=(a,b)=>{let s='';for(let i=a;i<b;i++){const v=S.scores[sk(p.id,i+1)];const par=holes[i].par;
    let cls='';if(v!=null){const d=v-par;cls=d<=-2?'sc-eagle':d===-1?'sc-birdie':d===1?'sc-bogey':d>=2?'sc-dbogey':'';}
    s+=`<div class="hcell ${i+1===h?'cur':''} ${cls}" onclick="gotoHole(${i+1})">
      <div class="muted">${i+1}</div><div class="s">${v!=null?v:'·'}</div><div class="muted" style="font-size:10px">p${par}</div></div>`;}
    return s;};
  const val=cur!=null?cur:hole.par;
  area.innerHTML=`
    <div class="hole-big"><span class="h">Hole ${h} · Par ${hole.par} · S.I. ${hole.si}</span>
      <span class="saved" id="savedFlag"></span></div>
    <div class="stepper">
      <button onclick="bump(-1)">−</button>
      <div class="val" id="scoreVal">${val}</div>
      <button onclick="bump(1)">＋</button></div>
    <div class="center muted" style="font-size:13px">${cur!=null?('Saved: '+cur+(S.tournament.format==='net'?(' · net '+(cur-stk)+' ('+stk+' stroke'+(stk!==1?'s':'')+')'):'')):'Tap ＋/− then Save'}</div>
    <div class="nav-holes">
      <button onclick="prevHole()">‹ Prev</button>
      <button class="btn" style="flex:2" onclick="saveHole()">Save hole ${h}</button>
      <button onclick="nextHole()">Next ›</button></div>
    <div style="margin-top:14px;display:flex;justify-content:space-between;font-size:14px">
      <span class="muted">Thru <strong>${thru}</strong></span>
      <span class="muted">Gross <strong>${gross||'–'}</strong> ${thru?('('+toParStr(gross-parThru)+')'):''}</span></div>
    <div class="holegrid">${grid(0,9)}</div>
    <div class="holegrid" style="margin-top:5px">${grid(9,18)}</div>`;
}
let pendingVal=null;
function bump(d){const el=document.getElementById('scoreVal');let v=parseInt(el.textContent)||holesArr()[S.curHole-1].par;
  v=Math.max(1,Math.min(20,v+d));el.textContent=v;pendingVal=v;}
function gotoHole(h){S.curHole=h;pendingVal=null;renderHoleGrid();}
function prevHole(){if(S.curHole>1){S.curHole--;pendingVal=null;renderHoleGrid();}}
function nextHole(){if(S.curHole<18){S.curHole++;pendingVal=null;renderHoleGrid();}}
async function saveHole(){
  const p=S.players.find(x=>x.id===S.entryPid);const h=S.curHole;
  const el=document.getElementById('scoreVal');const v=parseInt(el.textContent);
  if(isNaN(v)){return;}
  S.scores[sk(p.id,h)]=v; // optimistic
  const flag=document.getElementById('savedFlag');if(flag)flag.textContent='Saving…';
  const {error}=await sb.from('scores').upsert(
    {tournament_id:S.tournament.id,player_id:p.id,hole:h,strokes:v},
    {onConflict:'player_id,hole'});
  if(flag)flag.textContent=error?'⚠ retry':'Saved ✓';
  if(error){console.error(error);}
  if(S.curHole<18){setTimeout(()=>{S.curHole++;pendingVal=null;renderHoleGrid();},250);}
  else renderHoleGrid();
}

/* ---- Fourball / best-ball teams ---- */
function bestBallNet(members){
  const holes=holesArr();let total=0,thru=0;
  for(let i=0;i<18;i++){let best=null;
    members.forEach(p=>{const v=S.scores[sk(p.id,i+1)];if(v==null)return;
      const net=v-pStrokes(p,holes[i].si);if(best==null||net<best)best=net;});
    if(best!=null){total+=best;thru++;}}
  let par=0;for(let i=0;i<18;i++){const any=members.some(p=>S.scores[sk(p.id,i+1)]!=null);if(any)par+=holes[i].par;}
  return thru?{total,thru,rel:total-par}:null;
}
function viewTeams(){
  const groups={};S.players.forEach(p=>{if(p.group_no==null)return;(groups[p.group_no]=groups[p.group_no]||[]).push(p);});
  const keys=Object.keys(groups).map(Number).sort((a,b)=>a-b);
  if(!keys.length)return `<div class="card center muted">No fourball groups set for this event.</div>`;
  let html='';
  keys.forEach(k=>{const gp=groups[k];
    const t1=gp.filter(p=>p.team_no===1),t2=gp.filter(p=>p.team_no===2);
    html+=`<div class="grp"><strong>Group ${k}</strong> <span class="muted" style="font-size:12px">· ${gp.map(p=>esc(p.name.split(' ').slice(-1)[0])).join(', ')}</span>`;
    if(t1.length&&t2.length){
      const b1=bestBallNet(t1),b2=bestBallNet(t2);
      const nm=t=>t.map(p=>esc(p.name.split(' ').slice(-1)[0])).join(' / ');
      let win=-1;if(b1&&b2)win=b1.rel<b2.rel?0:b2.rel<b1.rel?1:-1;
      [[t1,b1,0],[t2,b2,1]].forEach(([t,b,i])=>{
        html+=`<div class="team-line ${win===i?'team-win':''}"><span>${win===i?'🏅 ':''}${nm(t)}</span>
          <span>${b?('net '+toParStr(b.rel)+' · thru '+b.thru):'—'}</span></div>`;});
    }else{html+=`<div class="muted" style="font-size:12.5px;margin-top:6px">Teams not set (need team 1 & 2).</div>`;}
    html+=`</div>`;});
  return `<div class="card"><h2>Fourball Best-Ball</h2>
    <p class="desc">Lower partner's net counts on each hole. Updates live.</p>${html}</div>`;
}

async function renderSeason(){
  document.getElementById('homeBtn').style.display='';

  document.getElementById('topSub').textContent='Season standings';
  app().innerHTML=`<div class="card center muted">Crunching the season…</div>`;

  const {data:tours}=await sb.from('tournaments').select('*').eq('status','completed').order('event_date');
  if(!tours||!tours.length){app().innerHTML=`<div class="card center"><h2>No results yet</h2>

  const ids=tours.map(t=>t.id);
  const [{data:players},{data:scores}]=await Promise.all([
    sb.from('players').select('*').in('tournament_id',ids),
    sb.from('scores').select('*').in('tournament_id',ids)
  ]);
  const standings=computeSeason(tours,players||[],scores||[]);
  const eventChips=tours.map(t=>`<span class="pill grn" style="margin:2px">${esc(t.name)}</span>`).join(' ');
  let rows=standings.map(s=>`<tr><td class="rank">${s.rank<=3?['🥇','🥈','🥉'][s.rank-1]:''} ${s.rank}</td>
    <td><strong>${esc(s.name)}</strong></td><td class="n"><span class="pill gold">${s.points}</span></td>
    <td class="n">${s.played}</td><td class="n">${s.wins}</td><td class="n">${s.best?('T'+s.best).replace('T1','1'):'—'}</td></tr>`).join('');
  app().innerHTML=`<div class="card">
    <h2>🏆 Golfer of the Year — Season Standings</h2>
    <p class="desc">Finish-position points across ${tours.length} completed event${tours.length>1?'s':''}. Players matched by name.</p>
    <div style="margin-bottom:10px">${eventChips}</div>
    <table><thead><tr><th>Rank</th><th>Player</th><th class="n">Points</th><th class="n">Played</th><th class="n">Wins</th><th class="n">Best</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="6" class="center muted">No scored players yet.</td></tr>'}</tbody></table>
    <div style="height:12px"></div><button class="btn ghost" onclick="goHome()">Home</button></div>`;

function computeSeason(tours,players,scores){
  // index scores by player
  const byPlayer={};scores.forEach(s=>{(byPlayer[s.player_id]=byPlayer[s.player_id]||[]).push(s);});
  const agg={}; // key: lowercased name
  tours.forEach(t=>{
    const holes=t.holes;const fmt=t.format;const par=holes.reduce((a,h)=>a+h.par,0);
    const chFor=idx=>{if(t.slope&&t.course_rating!=null)return Math.round((+idx||0)*(t.slope/113)+(t.course_rating-par));return Math.round(idx||0);};
    // compute each player's total (net or gross) for this event
    const field=players.filter(p=>p.tournament_id===t.id).map(p=>{
      const sc=(byPlayer[p.id]||[]);let gross=0,net=0,thru=0;
      sc.forEach(r=>{if(r.strokes==null)return;const hole=holes[r.hole-1];if(!hole)return;thru++;gross+=r.strokes;
        net+=r.strokes-strokesOnHoleRaw(chFor(p.handicap),hole.si);});
      return {name:p.name,total:fmt==='gross'?gross:net,thru};
    }).filter(x=>x.thru>0);
    if(!field.length)return;
    field.sort((a,b)=>a.total-b.total);
    // finish-position points with ties (average)
    let i=0;while(i<field.length){let j=i;while(j+1<field.length&&field[j+1].total===field[i].total)j++;
      let sum=0;for(let pos=i+1;pos<=j+1;pos++)sum+=seasonPts(pos);const avg=+(sum/(j-i+1)).toFixed(2);
      for(let k=i;k<=j;k++){field[k].position=i+1;field[k].points=avg;}i=j+1;}
    field.forEach(f=>{const key=f.name.toLowerCase();
      const a=agg[key]||(agg[key]={name:f.name,points:0,played:0,wins:0,best:null});
      a.points+=f.points;a.played++;if(f.position===1)a.wins++;if(a.best===null||f.position<a.best)a.best=f.position;});
  });
  const arr=Object.values(agg);arr.forEach(a=>a.points=+a.points.toFixed(2));
  arr.sort((a,b)=>b.points-a.points||a.name.localeCompare(b.name));
  arr.forEach((a,i)=>a.rank=i+1);return arr;
}
// standalone (no S dependency) stroke allocation, for season aggregation
function strokesOnHoleRaw(courseHcp,si){const h=Math.max(0,Math.round(courseHcp||0));
  return Math.floor(h/18)+((si<=(h%18))?1:0);}

/* expose for inline handlers already global (non-module script) */
/* build: v3 — course library + season standings */
boot();
